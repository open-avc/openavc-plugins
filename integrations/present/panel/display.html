<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Present</title>
  <!-- Served by the plugin's guest route at both /present/display/<display>
       and .../guest/display/<display>, so assets use the absolute open
       plugin panel-file route (relative paths would break under one mount). -->
  <link rel="stylesheet" href="/api/plugins/present/panel/display.css">
</head>
<body>
  <video id="video" autoplay playsinline></video>

  <div id="idle" class="idle">
    <div class="idle-inner">
      <div id="spaceName" class="space-name"></div>
      <div class="join-hint">To share your screen, open a browser and go to</div>
      <div id="joinHost" class="join-host"></div>
      <div class="code-caption">Join code</div>
      <div id="joinCode" class="join-code"></div>
    </div>
    <div id="displayLabel" class="display-badge"></div>
    <div id="idleStatus" class="idle-status"></div>
  </div>

  <div id="presenterBadge" class="presenter-badge" hidden></div>
  <button id="audioHint" class="audio-hint" hidden>Tap for sound</button>

  <script src="/api/plugins/present/panel/display.js"></script>
</body>
</html>
